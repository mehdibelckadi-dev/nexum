name: 'Nexum API Security Scan'
description: 'Scans MCP servers and OpenAPI specs for agentic risk. Uploads SARIF to GitHub Security tab.'

inputs:
  spec-file:
    description: 'Path to OpenAPI or MCP spec file'
    required: true
  fail-on-tier:
    description: 'Fail if risk tier >= this value (0-2)'
    required: false
    default: '2'
  validate:
    description: 'Run validator after scan'
    required: false
    default: 'false'
  baseline-path:
    description: 'Path to .nexumbaseline.json for suppressing known findings'
    required: false
    default: ''
  upload-sarif:
    description: 'Upload SARIF results to GitHub Security tab'
    required: false
    default: 'true'

outputs:
  risk-tier:
    description: 'Risk tier (0, 1, or 2)'
    value: ${{ steps.scan.outputs.risk-tier }}
  risk-score:
    description: 'Risk score (0-100)'
    value: ${{ steps.scan.outputs.risk-score }}
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.scan.outputs.findings-count }}
  sarif-path:
    description: 'Path to generated SARIF file'
    value: ${{ steps.scan.outputs.sarif-path }}

runs:
  using: 'composite'
  steps:
    - name: Install Nexum
      shell: bash
      run: pip install -e .

    - name: Run scan
      id: scan
      shell: bash
      run: |
        SARIF_FILE=$(mktemp /tmp/nexum-XXXXXX.sarif)

        BASELINE_FLAG=""
        if [ -n "${{ inputs.baseline-path }}" ] && [ -f "${{ inputs.baseline-path }}" ]; then
          BASELINE_FLAG="--baseline ${{ inputs.baseline-path }}"
        fi

        # Generate SARIF (banner goes to stderr; stdout is clean SARIF JSON)
        nexum scan "${{ inputs.spec-file }}" --format sarif $BASELINE_FLAG > "$SARIF_FILE" 2>/dev/null

        # Extract metrics from the full manifest JSON
        SCAN_JSON=$(nexum scan "${{ inputs.spec-file }}" $BASELINE_FLAG 2>/dev/null)
        TIER=$(echo "$SCAN_JSON"  | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['inferred_risk_tier'])")
        SCORE=$(echo "$SCAN_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['nexum_risk_score'])")
        COUNT=$(echo "$SCAN_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d['findings_summary']))")

        echo "risk-tier=$TIER"       >> "$GITHUB_OUTPUT"
        echo "risk-score=$SCORE"     >> "$GITHUB_OUTPUT"
        echo "findings-count=$COUNT" >> "$GITHUB_OUTPUT"
        echo "sarif-path=$SARIF_FILE" >> "$GITHUB_OUTPUT"

        if [ "${{ inputs.validate }}" = "true" ]; then
          MANIFEST_TMP=$(mktemp /tmp/nexum-manifest-XXXXXX.json)
          echo "$SCAN_JSON" > "$MANIFEST_TMP"
          VALIDATE_EXIT=0
          nexum validate "$MANIFEST_TMP" || VALIDATE_EXIT=$?
          rm -f "$MANIFEST_TMP"
          if [ "$VALIDATE_EXIT" -eq 1 ]; then
            echo "Nexum validator: DO_NOT_DISTRIBUTE — blocking"
            exit 1
          fi
        fi

        if [ "$TIER" -ge "${{ inputs.fail-on-tier }}" ]; then
          echo "Nexum: Tier $TIER >= fail-on-tier ${{ inputs.fail-on-tier }} — failing"
          exit 1
        fi

    - name: Upload SARIF to GitHub Security tab
      if: ${{ always() && inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-path }}
        category: nexum-agentic-risk
